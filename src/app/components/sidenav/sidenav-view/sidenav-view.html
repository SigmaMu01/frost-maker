@if (isSubmenuOpen()) {
<div class="wrapper">
  <div class="panel">
    <div>
      <label for="floorNum">Кол-во этажей</label>
      <input name="floorNum" type="number" min="1" max="99" [(ngModel)]="floorNum" />
    </div>
    <div>
      <label for="fieldOfView">FOV</label>
      <input name="fieldOfView" type="number" min="40" max="130" [(ngModel)]="fieldOfViewValue" />
    </div>
  </div>
  <div class="panel">
    <div>
      <button (click)="centerOnObject()">Центр</button>
    </div>
  </div>
  <div class="panel">
    <div>
      <button (click)="makeBuildingTransparent()">B transp</button>
    </div>
    <div>
      <button (click)="restoreBuilding()">B restore</button>
    </div>
  </div>
  <div class="panel">
    <div>
      <button (click)="toggleCube()">3D Cube vis</button>
    </div>
  </div>
  <div class="panel">
    <div>
      <button (click)="toggleColorTheme()">COLOR</button>
    </div>
  </div>
  <div class="panel">
    <div>
      <input
        class="input-range"
        type="range"
        min="0"
        max="24"
        step="1"
        [value]="sliceValue()"
        (input)="sliceValue.set($any($event.target).value)"
      />
    </div>
  </div>
</div>

}
