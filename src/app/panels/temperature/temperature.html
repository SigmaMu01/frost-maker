<label>
  <span>Термокоса</span>
  <span>{{ selectedTempChainId() ?? 'не выбрана' }}</span>
</label>
<div class="thermal-braid">
  @if (selectedTempChainId() && getTempChainFrame()) { @for (tuple of getTempChainFrame(); track tuple[0]){
  <label [for]="`temp-val-${$index}`">{{ tuple[0] }}</label>
  <input [name]="`temp-val-${$index}`" [value]="tuple[1]" />
  } }
</div>
